name: Auth Service CI

on:
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - 'k8s/**'
      - '**.md'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      # Step 1: 生成 GitHub App 临时 token，用于后续所有私有仓库的访问
      # repositories 明确列出所有需要访问的仓库（App 必须已安装到这些仓库）
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: flyingjack-cloud
          repositories: auth-service,common-lib,flyingjack-cloud,k8s-gitops

      # Step 2: 先 checkout 根仓库，获得 parent POM 和 mvnw
      # submodules: false 避免 git 尝试 init 所有子模块
      - name: Checkout flyingjack-cloud root
        uses: actions/checkout@v4
        with:
          repository: flyingjack-cloud/flyingjack-cloud
          token: ${{ steps.app-token.outputs.token }}
          submodules: false

      # Step 3: 将本次触发的 auth-service commit checkout 到 auth-service/ 目录
      # 不指定 repository，默认为当前触发仓库（auth-service）
      - name: Checkout auth-service
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: auth-service
          token: ${{ steps.app-token.outputs.token }}

      # Step 4: checkout common-lib，使用与当前触发分支同名的分支
      # develop 触发 → common-lib develop，main 触发 → common-lib main
      - name: Checkout common-lib (latest)
        uses: actions/checkout@v4
        with:
          repository: flyingjack-cloud/common-lib
          token: ${{ steps.app-token.outputs.token }}
          path: common-lib
          ref: ${{ github.ref_name }}

      # Step 4: 确保 mvnw 有执行权限（checkout 后可能丢失 +x）
      - name: Make mvnw executable
        run: chmod +x mvnw

      # Step 5: 从分支名推导 Maven profile 和镜像 tag 前缀
      # develop → beta，main → prod
      - name: Set build variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "PROFILE=prod" >> $GITHUB_ENV
          else
            echo "PROFILE=beta" >> $GITHUB_ENV
          fi
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Step 6: 安装 common-lib 到本地 Maven 仓库
      # -f 直接指向模块 pom.xml，Maven 只将根 pom 作为 parent 读取，
      # 不扫描 <modules> 列表，避免缺失的其他子模块导致报错
      - name: Install common-lib
        run: ./mvnw install -f common-lib/pom.xml -DskipTests -Dspring-boot.repackage.skip=true -q

      # Step 7: 构建并测试 auth-service（含 TestContainers，需要 Docker daemon）
      - name: Build and test auth-service
        run: ./mvnw clean verify -f auth-service/pom.xml -P ${{ env.PROFILE }}

      # Step 8: 构建镜像
      - name: Docker build
        run: |
          docker build \
            -t ${{ secrets.REGISTRY_URL }}/auth-service:${{ env.PROFILE }}-${{ env.SHORT_SHA }} \
            auth-service/

      # Step 9: 登录 registry（仅当 REGISTRY_USERNAME 已配置时执行）
      # 无认证的 registry:2 不需要设置该 secret，此步骤自动跳过
      - name: Docker login
        run: |
          if [ -n "${{ secrets.REGISTRY_USERNAME }}" ]; then
            echo "${{ secrets.REGISTRY_PASSWORD }}" | \
              docker login ${{ secrets.REGISTRY_URL }} \
              -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin
          else
            echo "REGISTRY_USERNAME not set, skipping login (unauthenticated registry)"
          fi

      # Step 10: 推送镜像
      - name: Docker push
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/auth-service:${{ env.PROFILE }}-${{ env.SHORT_SHA }}

      # Step 11: 更新 gitops 仓库镜像 tag，触发 ArgoCD 同步
      # 与触发分支保持一致：develop → gitops develop，main → gitops main
      - name: Update gitops image tag
        env:
          GITOPS_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE: ${{ secrets.REGISTRY_URL }}/auth-service:${{ env.PROFILE }}-${{ env.SHORT_SHA }}
          OVERLAY: auth-service/overlays/${{ env.PROFILE }}
          GITOPS_BRANCH: ${{ github.ref_name }}
        run: |
          git clone --branch ${GITOPS_BRANCH} https://x-access-token:${GITOPS_TOKEN}@github.com/flyingjack-cloud/k8s-gitops.git
          cd k8s-gitops
          sed -i "s|image: .*auth-service.*|image: ${IMAGE}|" "${OVERLAY}/deployment-patch.yaml"
          git config user.email "ci@flyingjack.com"
          git config user.name "CI Bot"
          git add "${OVERLAY}/deployment-patch.yaml"
          if git diff --cached --quiet; then
            echo "Image tag unchanged, nothing to push"
          else
            git commit -m "chore(auth-service): update image to ${{ env.PROFILE }}-${{ env.SHORT_SHA }}"
            git push origin ${GITOPS_BRANCH}
          fi
