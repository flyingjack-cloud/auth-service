apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: registry.wms.com:8443/cloud/flyingjack-auth-service:latest
#          ports:
#            - containerPort: 5005  # 调试端口
#          env:
#            - name: JAVA_TOOL_OPTIONS
#              value: "-Dspring.jvm.enable-preview=true -XX:+EnableDynamicAgentLoading -agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005"