spring:
  data:
    redis:
      host: beta.flyingcloud.com
      port: 6379
      password: ${REDIS_PASSWORD} # 通过k8s secret注入
      database: 0
      timeout: 5000 #5s
  datasource:
    url: jdbc:postgresql://beta.flyingcloud.com:5432/auth
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  logging:
    level:
      root: INFO
      org:
        hibernate:
          type: TRACE
          SQL: DEBUG
        springframework:
          boot:
            autoconfigure:
              jdbc: DEBUG
      com:
        zaxxer:
          hikari:
            HikariConfig: DEBUG
debug: true

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

logging:
  level:
    org.springframework.boot.env: DEBUG
    org.springframework.boot.context.config: TRACE
    org.springframework.cloud.kubernetes: DEBUG