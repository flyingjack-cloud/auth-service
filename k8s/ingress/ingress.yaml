apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-auth
spec:
  rules:
    - host: api.wms.com
      http:
        paths:
          - backend:
              service:
                name: auth-service
                port:
                  number: 9000
            pathType: Prefix
            path: /auth
  ingressClassName: nginx
