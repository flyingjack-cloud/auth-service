apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service # 与上面matchLabels一致
    spec:
      serviceAccountName: auth-service-account
      containers:
        - name: auth-service
          image: registry.wms.com:8443/cloud/flyingjack-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
              name: api
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SPRING_PROFILES_ACTIVE # 从config中获取激活的profiles注入到env
      restartPolicy: Always
