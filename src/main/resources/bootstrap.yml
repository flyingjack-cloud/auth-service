spring:
  cloud:
    kubernetes:
      config:
        name: auth-service-config
        enabled: true
        # 默认会调用pod的namespace，也可以用下面的手动获取
        # namespace: ${SPRING_PROFILES_ACTIVE:default}
      secrets:
        enabled: true
        enable-api: true
        fail-fast: true
        labels:
          secret.group: auth-connect
      reload:
        enabled: true
        mode: polling
        period: 500

server:
  port: 9000