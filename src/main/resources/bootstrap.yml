spring: # 不要设置spring.application.name不然k8s默认{application-name}.yml
  cloud:
    kubernetes:
      config:
        name: auth-service-config
        enabled: true
        # 默认会调用pod的namespace，也可以用下面的手动获取
        # namespace: ${SPRING_PROFILES_ACTIVE:default}
      secrets:
        enabled: true
        enable-api: true
        fail-fast: true
        sources:
          - labels:
              secret.group: auth-connect
          - labels:
              secret.group: cache-access-secret
      reload:
        enabled: true
        mode: polling
        period: 500
