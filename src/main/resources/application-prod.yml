spring:
  cloud:
    kubernetes:
      discovery:
        enabled: true
        discovery-server-url: https://kubernetes.default.svc.cluster.local:443
      client:
        # 自动读取pod内serviceaccount的ca证书，绕过JDK信任库问题
        trust-certs: true
        
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
        step: 1m
