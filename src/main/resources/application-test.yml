server:
  port: 9090

spring:
  web:
    locale: en_US
  # 覆盖 application.yml 中的 ${DB_URL} 占位符，实际连接由 @DynamicPropertySource 注入
  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: test
    password: test
  data:
    redis:
      host: localhost
      password: ""
  sql:
    init:
      mode: always
      data-locations: classpath:data-test.sql
  # 关闭根据JPA实体自动创建表
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    show-sql: true

# 雪花ID配置
snowflake:
  datacenter-id: node-1
  machine-id: pod-1
