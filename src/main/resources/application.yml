spring:
  # 注意以下的值可能会k8s覆盖
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  messages:
    basename: i18n/message
    encoding: utf-8
    sentinel:
      eager: false
      transport:
        dashboard: ${SENTINEL_HOST:127.0.0.1}:8858

feign:
  sentinel:
    enabled: true # @FeignClient将会被自动添加@SentinelResource

# 雪花ID配置
snowflake:
  datacenter-id: ${DATACENTER_ID:1} # 不能超过31
  machine-id: ${MACHINE_ID:1} # 不能超过31